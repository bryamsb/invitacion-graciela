<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Graciela</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8ece8,#f3ddd4);
    font-family:Georgia,serif;
    overflow:hidden;
}

.envelope-stage{
    width:360px;
    height:260px;
    position:relative;
}

.envelope{
    position:absolute;
    inset:0;
    cursor:pointer;
}

.env-body{
    position:absolute;
    bottom:0;
    width:100%;
    height:180px;
    background:#fffaf6;
    border:1px solid #d8b893;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    overflow:hidden;
}

.env-body::before{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    border-left:180px solid transparent;
    border-bottom:90px solid rgba(216,184,147,.22);
}

.env-body::after{
    content:"";
    position:absolute;
    right:0;
    bottom:0;
    border-right:180px solid transparent;
    border-bottom:90px solid rgba(216,184,147,.22);
}

.env-flap{
    position:absolute;
    top:79px;
    left:0;
    width:0;
    height:0;
    border-left:180px solid transparent;
    border-right:180px solid transparent;
    border-top:100px solid #fff4ec;
    transform-origin:top center;
    transition:1s;
    z-index:5;
}

.seal{
    position:absolute;
    top:125px;
    left:50%;
    transform:translateX(-50%);
    width:60px;
    height:60px;
    border-radius:50%;
    background:#b45d6b;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    z-index:6;
}

.text{
    position:absolute;
    bottom:-45px;
    width:100%;
    text-align:center;
    color:#7a624b;
    letter-spacing:2px;
}

.open .env-flap{
    transform:rotateX(180deg);
}

.open .seal{
    opacity:0;
}

#card{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,.2);
    padding:15px;
}

#invite{
    max-width:95vw;
    max-height:80vh;
    border-radius:14px;
    box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.map-btn{
    margin-top:16px;
    background:#b45d6b;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:30px;
    font-weight:bold;
}
</style>
</head>
<body>

<!-- AUDIO -->
<audio id="bgMusic" preload="auto" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="envelope-stage">
    <div id="env" class="envelope" onclick="openCard()">
        <div class="env-flap"></div>
        <div class="env-body"></div>
        <div class="seal">❤</div>
        <div class="text">TOCA EL SOBRE</div>
    </div>
</div>

<div id="card">
    <img
        id="invite"
        src="https://i.ibb.co/2b3dBM7/owo.png"
        alt="Invitación"
    >

    <a
        class="map-btn"
        target="_blank"
        href="https://www.google.com/maps/search/?api=1&query=Calle+Jesus+Alberto+Paez+173+Santa+Anita+Peru">
        📍 Ver ubicación
    </a>
</div>

<script>

window.onload = function(){
    const audio = document.getElementById("bgMusic");

    audio.addEventListener("loadeddata", () => {
        console.log("MP3 cargado correctamente");
    });

    audio.addEventListener("error", (e) => {
        console.error("Error cargando MP3", e);
    });
};

function openCard(){

    const music = document.getElementById("bgMusic");

    music.volume = 0.4;

    music.play()
        .then(() => {
            console.log("Audio reproduciéndose");
        })
        .catch(err => {
            console.error("No se pudo reproducir:", err);
        });

    document.getElementById("env").classList.add("open");

    setTimeout(() => {

        document.querySelector(".envelope-stage").style.display = "none";

        document.getElementById("card").style.display = "flex";

    }, 700);
}
</script>

</body>
</html>
